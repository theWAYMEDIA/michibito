{{ define "main" }}
<article>
    <h1>{{ .Title }}</h1>
    {{ .Content }}

    {{ if eq .Section "shoseki" }}
        {{ partial "smart-book-nav.html" . }}
    {{ end }}

    {{ if .Params.related }}
    <div class="related">
        <h3>関連概念：</h3>
        <ul>
        {{ range .Params.related }}
            <li><a href="/yogoshu/#{{ . | urlize }}">{{ . }}</a></li>
        {{ end }}
        </ul>
    </div>
    {{ end }}
</article>
{{ end }}
